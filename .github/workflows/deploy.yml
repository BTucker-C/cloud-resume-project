name: Deploy Resume Site to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Upload site files to S3
        run: |
          aws s3 cp frontend/index.html s3://brandon-tucker-resume/index.html
          aws s3 cp frontend/style.css s3://brandon-tucker-resume/style.css
          aws s3 cp frontend/script.js s3://brandon-tucker-resume/script.js

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E158F7HA7QL1RM \
            --paths "/*"
